[package]
name = "quarb-session"
description = "Backend-agnostic interactive Quarb session — macro history (&N/&N!/&N#) over a pluggable Executor and Store"
keywords = ["query", "repl", "interactive", "quarb"]
categories = ["command-line-utilities"]
readme = "README.md"
# Decoupled from the workspace 0.3.0 fleet (README + quai's patch line).
version = "0.4.1"
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true

[features]
# `native` pulls in the full local adapter fleet and the filesystem
# `open`/`mount` dispatch. Without it (the wasm build) only the
# text-format adapters compile, driven by `Doc::parse(text, format)`.
default = ["native"]
native = [
    "dep:quarb-sqlite",
    "dep:quarb-fs",
    "dep:quarb-compose",
    "dep:quarb-git",
    "dep:quarb-archive",
    "dep:quarb-xlsx",
    "dep:quarb-code",
    "dep:quarb-mount",
]

[dependencies]
quarb = { path = "../quarb", version = "0.4.1" }
# Text-format adapters — always compiled (wasm-safe).
quarb-json = { path = "../quarb-json", version = "0.4.1" }
quarb-csv = { path = "../quarb-csv", version = "0.4.1" }
quarb-yaml = { path = "../quarb-yaml", version = "0.4.1" }
quarb-toml = { path = "../quarb-toml", version = "0.4.1" }
quarb-xml = { path = "../quarb-xml", version = "0.4.1" }
quarb-html = { path = "../quarb-html", version = "0.4.1" }
quarb-markdown = { path = "../quarb-markdown", version = "0.4.1" }
# Native-only adapters — gated behind `native`.
quarb-sqlite = { path = "../quarb-sqlite", version = "0.4.1", optional = true }
quarb-fs = { path = "../quarb-fs", version = "0.4.1", optional = true }
quarb-compose = { path = "../quarb-compose", version = "0.4.1", optional = true }
quarb-git = { path = "../quarb-git", version = "0.4.1", optional = true }
quarb-archive = { path = "../quarb-archive", version = "0.4.1", optional = true }
quarb-xlsx = { path = "../quarb-xlsx", version = "0.4.1", optional = true }
quarb-code = { path = "../quarb-code", version = "0.4.1", optional = true }
quarb-mount = { path = "../quarb-mount", version = "0.4.1", optional = true }
anyhow.workspace = true
