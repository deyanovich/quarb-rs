[package]
name = "quarb-sqlite"
description = "SQLite adapter for the Quarb query engine"
keywords = ["query", "sqlite", "sql", "quarb"]
categories = ["database"]
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true

[dependencies]
quarb = { path = "../quarb", version = "0.6.0" }
quarb-relational = { path = "../quarb-relational", version = "0.6.0" }
rusqlite.workspace = true
thiserror.workspace = true

[dev-dependencies]
quarb-sql = { path = "../quarb-sql" }

[features]
# Vendor SQLite (rusqlite's bundled build) — portable wheels and
# static binaries want this; system-library builds stay default.
bundled = ["rusqlite/bundled"]
