[package]
# Not on crates.io yet: requires metatheca 0.1.3, which is not
# published (registry has 0.1.0). Flip to publishable once the
# sibling releases — the crate itself is registry-ready.
publish = false
name = "quarb-metatheca"
description = "Metatheca vault adapter for the Quarb query engine"
keywords = ["query", "metatheca", "vault", "history", "quarb"]
categories = ["development-tools", "database"]
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true

[dependencies]
quarb = { path = "../quarb", version = "0.3.0" }
metatheca = "0.1.3"
serde_json.workspace = true
thiserror.workspace = true

[dev-dependencies]
tempfile.workspace = true
